name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v4

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  purge-cache:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Purge Cloudflare edge cache for github.skyphusion.net
        env:
          CLOUDFLARE_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$CLOUDFLARE_PURGE_TOKEN" ]; then
            echo "CLOUDFLARE_PURGE_TOKEN secret is not set" >&2
            exit 1
          fi

          zone_id=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_PURGE_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=skyphusion.net" \
            | jq -re '.result[0].id')

          # Purge by explicit URL list (works on every Cloudflare plan and
          # never touches the rest of the skyphusion.net zone).
          response=$(curl -sf -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_PURGE_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${zone_id}/purge_cache" \
            --data '{"files":[
              "https://github.skyphusion.net/",
              "https://github.skyphusion.net/index.html",
              "https://github.skyphusion.net/sitemap.xml",
              "https://github.skyphusion.net/robots.txt",
              "https://github.skyphusion.net/assets/css/style.css"
            ]}')

          echo "$response" | jq -e '.success == true' >/dev/null \
            || { echo "Cache purge failed: $response" >&2; exit 1; }
          echo "Edge cache purged for github.skyphusion.net"
